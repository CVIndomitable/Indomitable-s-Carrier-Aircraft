modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
description = '''
不挠的舰载机 - 一个功能完整的舰载机系统模组。
包含 AI 控制的飞机实体、复杂状态机系统、多种弹道类型、火控与锁定系统、编组系统等。
'''
logoFile = "icon.png"
authors = "Indomitable"

[[dependencies.${mod_id}]]
